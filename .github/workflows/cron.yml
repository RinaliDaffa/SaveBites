name: SaveBites Cron Jobs

on:
  schedule:
    # Expiry sweep every 10 minutes
    - cron: "*/10 * * * *"
    # Daily payouts at 19:00 UTC (02:00 WIB next day)
    - cron: "0 19 * * *"
  workflow_dispatch:

concurrency:
  group: savebites-cron
  cancel-in-progress: false

jobs:
  expiry:
    if: github.event.schedule == '*/10 * * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/expiry
        run: |
          RESP=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/cron/expiry" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "$RESP"
          CODE=$(echo "$RESP" | tail -n1)
          if [ "$CODE" -ge 400 ]; then exit 1; fi

  payouts:
    if: github.event.schedule == '0 19 * * *'
    runs-on: ubuntu-latest
    steps:
      - name: Hit /api/cron/payouts
        run: |
          RESP=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.APP_URL }}/api/cron/payouts" \
            -H "X-Cron-Secret: ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          echo "$RESP"
          CODE=$(echo "$RESP" | tail -n1)
          if [ "$CODE" -ge 400 ]; then exit 1; fi